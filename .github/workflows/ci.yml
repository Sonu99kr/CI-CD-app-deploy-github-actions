name: CI/CD to ECS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: fullauto-test
      ECS_CLUSTER: cl-test
      ECS_SERVICE: auto-test-task-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin 823963318858.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: docker build -t $ECR_REPOSITORY .

      - name: Tag Image
        run: docker tag $ECR_REPOSITORY:latest 823963318858.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push Image to ECR
        run: docker push 823963318858.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment
